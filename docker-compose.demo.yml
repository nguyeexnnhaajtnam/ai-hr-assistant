services:
  postgres:
    image: postgres:17-alpine
    container_name: ai_hr_scanner_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_hr_scanner
    volumes:
      - postgres_demo_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_hr_scanner"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_hr_scanner_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/ai_hr_scanner
      GEMINI_API_KEY: ${GEMINI_API_KEY:-demo_key_replace_me}
      LOCAL_UPLOAD_DIR: /app/uploads
      APP_PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - demo_uploads:/app/uploads

volumes:
  postgres_demo_data:
  demo_uploads:
